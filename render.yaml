databases:
  - name: pulso-postgres
    plan: basic-256mb

services:
  - type: web
    name: pulso-backend
    runtime: docker
    plan: starter
    region: oregon
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulso-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: CORS_ORIGINS
        value: https://tu-frontend.vercel.app,https://*.vercel.app
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: ADMIN_COOKIE_NAME
        value: pulso_admin_session
      - key: AI_FILTER_ENABLED
        value: "true"
      - key: AI_FILTER_ENFORCE
        value: "true"
      - key: AI_PROVIDER_ORDER
        value: gemini,ollama
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_MODEL
        value: qwen3
      - key: AI_TIMEOUT_MS
        value: "30000"
      - key: AI_OLLAMA_URL
        sync: false
      - key: EDITORIAL_GUIDELINES_PATH
        value: ./editorial/pulso-pais-linea-editorial.txt
      - key: USER_SESSION_COOKIE_NAME
        value: pulso_user_session
      - key: USER_SESSION_SECRET
        sync: false
      - key: USER_SESSION_HOURS
        value: "720"
      - key: AUTH_RATE_LIMIT_WINDOW_MS
        value: "600000"
      - key: AUTH_RATE_LIMIT_MAX_ATTEMPTS
        value: "20"
      - key: USER_EMAIL_CODE_SECRET
        sync: false
      - key: USER_EMAIL_CODE_TTL_MINUTES
        value: "15"
      - key: EMAIL_ENABLED
        value: "true"
      - key: EMAIL_PROVIDER
        value: resend
      - key: EMAIL_FROM
        value: Pulso Pais <no-reply@pulsopais.local>
      - key: RESEND_API_KEY
        sync: false
